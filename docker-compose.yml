services:
  backend:
    build:
      context: ./smart-erp-backend
      dockerfile: Dockerfile
    container_name: smarterp-backend
    restart: always

    env_file:
      - ./smart-erp-backend/.env

    ports:
      - "9521:9521"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9521/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ./smart-erp-frontend
      dockerfile: Dockerfile
    container_name: smarterp-frontend
    restart: always

    depends_on:
      backend:
        condition: service_healthy

    env_file:
      - ./smart-erp-frontend/.env

    ports:
      - "80:80"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s