spring.application.name=smart-erp-application

server.port=${SERVER_PORT:9521}

spring.datasource.url=${DATABASE_URL:${SUPABASE-URL:jdbc:postgresql://localhost:5432/smarterp}}
spring.datasource.username=${DATABASE_USERNAME:${SUPABASE-USERNAME:postgres}}
spring.datasource.password=${DATABASE_PASSWORD:${SUPABASE-PASSWORD:postgres}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# SQL Initialization
spring.sql.init.mode=${SQL_INIT_MODE:always}

jwt.secret=${JWT_SECRET:${JWT-SECRET:dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLXNtYXJ0LWVycC1hcHBsaWNhdGlvbi1kZXZlbG9wbWVudA==}}
jwt.expiration=${JWT_EXPIRATION:86400000}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.servlet.multipart.max-file-size=${MAX_UPLOAD_SIZE:20MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_SIZE:20MB}

spring.jackson.time-zone=Asia/Kolkata

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD:${REDIS-PASSWORD:}}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}
spring.data.redis.timeout=5000ms
spring.data.redis.repositories.enabled=false

# Hikari Connection Pool Settings (Optimized for 15-connection database limit)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=30000